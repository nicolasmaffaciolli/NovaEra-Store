<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaEra Store</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{font-family:Montserrat,sans-serif;background:#0b0b0b;color:#fff;}

header{
position:fixed;top:0;width:100%;
background:#000;padding:15px 25px;
display:flex;justify-content:space-between;align-items:center;
border-bottom:2px solid red;
z-index:1000;
}

nav ul{display:flex;list-style:none;gap:20px;}
nav ul li a{color:#fff;text-decoration:none;}
nav ul li a:hover{color:red;}

.hero{
margin-top:90px;
padding:120px 20px;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1554284126-aa88f22d8b74");
background-size:cover;
}

.hero h1{font-size:3rem;}
.hero p{opacity:0.8;margin-top:10px;}

.section{padding:40px 20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#141414;
border:1px solid #222;
border-radius:10px;
padding:15px;
transition:0.3s;
}

.card:hover{border-color:red;transform:translateY(-5px);}

.card img{width:100%;height:180px;object-fit:cover;border-radius:8px;}

.price{color:red;font-weight:bold;margin-top:8px;}

button{
background:red;color:#fff;border:none;
padding:10px;border-radius:6px;
cursor:pointer;margin-top:10px;
}

button:hover{background:#ff2e2e;}

footer{
text-align:center;padding:40px;
background:#000;border-top:1px solid #222;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<h2>NovaEra Store</h2>
<nav>
<ul>
<li><a href="#hero">Início</a></li>
<li><a href="#cats">Categorias</a></li>
<li><a href="#prods">Produtos</a></li>
</ul>
</nav>
</header>

<section class="hero" id="hero">
<h1>NovaEra Store</h1>
<p>Produtos fitness premium para sua evolução</p>
</section>

<section class="section" id="cats">
<h2>Categorias</h2>
<div class="grid" id="categories"></div>
</section>

<section class="section" id="prods">
<h2>Produtos</h2>
<div class="grid" id="products"></div>
</section>

<footer>
<p>NovaEra Store © 2026</p>
</footer>

<script>
// Firebase
const firebaseConfig = {
apiKey: "AIzaSyC8ZivVIX7x9qNPbU2wu7Z4_f2pCWBH8cA",
authDomain: "novaera-store.firebaseapp.com",
projectId: "novaera-store"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// dados
let categories = [];
let products = [];

// elementos
const catDiv = document.getElementById("categories");
const prodDiv = document.getElementById("products");

// categorias
db.collection("categories").onSnapshot(snap=>{
categories = [];
catDiv.innerHTML = "";

snap.forEach(doc=>{
const data = doc.data();
categories.push({id:doc.id,...data});

catDiv.innerHTML += `
<div class="card" onclick="loadProducts('${doc.id}')">
<h3>${data.name || ""}</h3>
<p>${data.description || ""}</p>
</div>`;
});
});

// produtos
db.collection("products").onSnapshot(snap=>{
products = [];
prodDiv.innerHTML = "";

snap.forEach(doc=>{
const data = doc.data();
products.push({id:doc.id,...data});

prodDiv.innerHTML += `
<div class="card">
<img src="${data.image || ''}">
<h3>${data.title || ''}</h3>
<p class="price">R$ ${data.price || ''}</p>
<button onclick="window.open('${data.link || '#'}')">Ver Produto</button>
</div>`;
});
});

// filtro por categoria
function loadProducts(catId){
prodDiv.innerHTML = "";

products
.filter(p=>p.categoryId === catId)
.forEach(p=>{
prodDiv.innerHTML += `
<div class="card">
<img src="${p.image || ''}">
<h3>${p.title || ''}</h3>
<p class="price">R$ ${p.price || ''}</p>
<button onclick="window.open('${p.link || '#'}')">Ver Produto</button>
</div>`;
});
}
</script>

</body>
</html>
