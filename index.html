<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaEra Store</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Montserrat,sans-serif;background:#0b0b0b;color:#fff}

/* HEADER */
header{
padding:15px 30px;
background:#000;
border-bottom:2px solid red;
display:flex;
justify-content:space-between;
align-items:center;
}

header button{
margin-left:10px;
padding:8px 12px;
background:red;
border:none;
color:#fff;
border-radius:8px;
cursor:pointer;
}

/* HERO */
.hero{
padding:120px 20px;
text-align:center;
background:url("https://images.unsplash.com/photo-1554284126-aa88f22d8b74") center/cover;
}

.hero h1{font-size:32px;margin-bottom:10px}
.hero p{opacity:0.9}

/* CATEGORIAS */
.categories{
padding:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.cat{
background:#141414;
padding:10px 15px;
border-radius:12px;
cursor:pointer;
border:1px solid #333;
text-align:center;
}

.cat small{
display:block;
margin-top:5px;
opacity:0.7;
}

/* BOTÃO */
.all-btn{
display:block;
margin:15px auto;
padding:10px 20px;
background:#333;
border:none;
color:#fff;
border-radius:10px;
cursor:pointer;
}

/* PRODUTOS */
.products{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#141414;
padding:15px;
border-radius:10px;
border:1px solid #222;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.card button{
background:red;
color:#fff;
border:none;
padding:10px;
width:100%;
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<h2>NovaEra Store</h2>

<div>
<button onclick="loginAdmin()">Admin</button>
<button onclick="logoutAdmin()">Sair</button>
</div>
</header>

<!-- HERO (RESTAURADO) -->
<section class="hero">
<h1>Bem-vindo à NovaEra Store</h1>
<p>
A NovaEra Store é referência em produtos fitness premium.<br>
Aqui você encontra suplementos, equipamentos e produtos selecionados para elevar seu desempenho ao máximo.
</p>
</section>

<!-- CATEGORIAS -->
<div class="categories" id="categories"></div>

<!-- BOTÃO VER TODOS -->
<button class="all-btn" onclick="resetFilter()">
Ver todos produtos
</button>

<!-- PRODUTOS -->
<div class="products" id="products"></div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyC8ZivVIX7x9qNPbU2wu7Z4_f2cPWBH8cA",
authDomain: "novaera-store.firebaseapp.com",
projectId: "novaera-store",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let allProducts = [];
let allCategories = [];
let isAdmin = false;

/* CATEGORIAS */
db.collection("categories").onSnapshot(s=>{
allCategories = [];
const div = document.getElementById("categories");
div.innerHTML = "";

s.forEach(doc=>{
const c = doc.data();
allCategories.push({id:doc.id,...c});

div.innerHTML += `
<div class="cat" onclick="filter('${doc.id}')">
<strong>${c.name}</strong>
<small>${c.description || ''}</small>
</div>`;
});
});

/* PRODUTOS */
db.collection("products").onSnapshot(s=>{
allProducts = [];
const div = document.getElementById("products");
div.innerHTML = "";

s.forEach(doc=>{
const p = doc.data();
allProducts.push({id:doc.id,...p});
renderProduct(p);
});
});

/* FILTRO */
function filter(id){
const div = document.getElementById("products");
div.innerHTML = "";

allProducts
.filter(p=>p.categoryId===id)
.forEach(p=>renderProduct(p));
}

/* RESET */
function resetFilter(){
const div = document.getElementById("products");
div.innerHTML = "";

allProducts.forEach(p=>renderProduct(p));
}

/* PRODUTO */
function renderProduct(p){
const div = document.getElementById("products");

div.innerHTML += `
<div class="card">
<img src="${p.image || ''}">
<h3>${p.title || ''}</h3>
<p>R$ ${p.price || ''}</p>
<button onclick="window.open('${p.link || '#'}')">Ver Produto</button>
</div>`;
}

/* LOGIN ADMIN */
function loginAdmin(){
const email = prompt("Email:");
const senha = prompt("Senha:");

auth.signInWithEmailAndPassword(email,senha)
.then(()=>{
isAdmin = true;
alert("Admin logado 🔐");
})
.catch(()=>alert("Erro no login ❌"));
}

/* LOGOUT */
function logoutAdmin(){
auth.signOut().then(()=>{
isAdmin = false;
alert("Saiu do admin");
});
}
</script>

</body>
</html>
